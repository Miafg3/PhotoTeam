<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PhotoTeam</title>
        <link rel="stylesheet" href="./css/style.css">
        <script src="https://kit.fontawesome.com/63b0c67427.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header class="header">
            <div class="wrapper">
                <div class="logo">
                    <a href="#">PhotoTeam</a>
                </div>

                <div class="search-box">
                    <input type="search" placeholder="Search Our Website..." />
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
            <!-- <nav class="nav-bar">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Style Demo</a></li>
                    <li><a href="#">Full Width</a></li>
                    <li><a href="#">Dropdown</a></li>
                    <li><a href="#">Gallery</a></li>
                </ul>
            </nav> -->
        </header>

        <main>
            <section class="gallery">
                <div class="gallery-main">
                    <img src="https://picsum.photos/id/176/900/600" alt="Main Image" id="main-image">
                </div>
            
                <div class="gallery-list">
                    <img src="https://picsum.photos/id/176/300/300" alt="" class="thumb active">
                    <img src="https://picsum.photos/id/184/300/300" alt="" class="thumb">
                    <img src="https://picsum.photos/id/171/300/300" alt="" class="thumb">
                    <img src="https://picsum.photos/id/194/300/300" alt="" class="thumb">
                </div>
            </section>
        </main>

        <script src="./js/main.js"></script>

    </body>
</html>
